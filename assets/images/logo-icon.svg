<?xml version="1.0" encoding="UTF-8"?>
<!--
  CPP + CPQ  —  Icon Mark  (60 × 60)
  "The Constraint Selector" — three progressively shorter bars
  show all options narrowing to a single derived result (amber dot).
  This is literally what CPP does: constraint propagation collapses
  the full option space to one valid configuration.
  Use: nav bar, app icon, favicon
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">

  <!-- Engineering dark background -->
  <rect width="60" height="60" rx="13" fill="#0F172A"/>

  <!-- Bar 1 — full option space (all choices available) -->
  <rect x="10" y="16" width="40" height="5" rx="2.5" fill="white" opacity="0.28"/>

  <!-- Bar 2 — constrained (CPP engine has applied rules) -->
  <rect x="10" y="27" width="26" height="5" rx="2.5" fill="#38BDF8" opacity="0.72"/>

  <!-- Bar 3 — final valid selection -->
  <rect x="10" y="38" width="14" height="5" rx="2.5" fill="#0EA5E9"/>

  <!-- Amber dot — CPQ output: the priced, derived result -->
  <circle cx="33" cy="40.5" r="4.5" fill="#F59E0B"/>

</svg>
